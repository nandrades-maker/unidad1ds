<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juegos Didácticos | Aula Virtual</title>
<link rel="icon" href="img/Gemini_Generated_Image_ig2ddlig2ddlig2d.png"  >
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Paleta robot cafetero ──
     Negro/carbón  → estructura, header
     Blanco metál  → superficies card
     Verde neón    → acento primario (ojos del robot)
     Dorado paja   → sombrero, highlights
     Marrón cuero  → secundario cálido
     Rojo cereza   → tag/acento fuerte
  */
  --pri:       #3D7A0A;     /* verde profundo (hoja de café) */
  --pri-lt:    #6DBF10;     /* verde neón suave (ojos robot) */
  --pri-dk:    #1E3D05;     /* verde muy oscuro */
  --accent:    #B8860B;     /* dorado sombrero */
  --accent-lt: #D4A832;     /* dorado claro */
  --bg-page:   #1C1C1C;     /* negro carbón (fondo robot) */
  --bg-card:   #2A2A2A;     /* gris oscuro metálico */
  --bg-header: #141414;     /* negro profundo */
  --text-dk:   #F0F0F0;     /* blanco metálico */
  --text-md:   #A8A8A8;     /* gris claro */
  --text-lt:   #606060;     /* gris apagado */
  --border:    #3A3A3A;     /* borde sutil oscuro */
  --tag-bg:    #1E3D05;     /* verde muy oscuro */
  --tag-text:  #8FD620;     /* verde neón texto */
  --success:   #6DBF10;     /* verde neón */
  --warn:      #D4A832;     /* dorado */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
}

body {
  font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
  background: var(--bg-page);
  color: var(--text-dk);
  min-height: 100vh;
}

/* ── TOP BAR (estilo Moodle) ── */
.topbar {
  background: var(--bg-header);
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.topbar-logo svg { width: 26px; height: 26px; flex-shrink: 0; }
.topbar-logo span {
  font-family: 'Merriweather', serif;
  font-size: 1rem;
  color: #fff;
  letter-spacing: .03em;
}
.topbar-spacer { flex: 1; }
.topbar-user {
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,.85);
  font-size: .85rem;
}
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent-lt);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .75rem; color: #fff;
}

/* ── BREADCRUMB ── */
.breadcrumb {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 10px 32px;
  font-size: .82rem;
  color: var(--text-md);
  display: flex;
  align-items: center;
  gap: 6px;
}
.breadcrumb a { color: var(--pri-lt); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }
.sep { color: var(--text-lt); font-size: .7rem; }

/* ── HERO SECTION ── */
.hero {
  background: linear-gradient(135deg, var(--pri-dk) 0%, var(--pri) 55%, var(--pri-lt) 100%);
  padding: 36px 32px 32px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  right: -60px; top: -60px;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: rgba(255,255,255,.04);
}
.hero::after {
  content: '';
  position: absolute;
  right: 60px; bottom: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(255,255,255,.03);
}
.hero-inner { position: relative; max-width: 1100px; margin: 0 auto; }
.hero h1 {
  font-family: 'Merriweather', serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  margin-bottom: 8px;
  line-height: 1.3;
}
.hero p {
  font-size: clamp(.88rem, 2vw, 1rem);
  opacity: .85;
  max-width: 560px;
  line-height: 1.5;
}
.hero-meta {
  margin-top: 18px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.hero-badge {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 99px;
  padding: 4px 14px;
  font-size: .78rem;
  color: rgba(255,255,255,.9);
  letter-spacing: .04em;
}

/* ── TOOLBAR / FILTROS ── */
.toolbar {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 24px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.toolbar-title {
  font-size: .82rem;
  font-weight: 600;
  color: var(--text-md);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-right: 4px;
}
.filter-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: #fff;
  font-family: inherit;
  font-size: .82rem;
  color: var(--text-md);
  cursor: pointer;
  transition: .15s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--pri);
  border-color: var(--pri);
  color: #fff;
}
.toolbar-spacer { flex: 1; }
.search-box {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: .85rem;
  color: var(--text-dk);
  background: #fff;
  width: 200px;
  outline: none;
  transition: border-color .15s;
}
.search-box:focus { border-color: var(--pri-lt); }

/* ── GRID DE CARDS ── */
.grid-section {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 24px 48px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* ── CARD ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .18s, box-shadow .18s;
  text-decoration: none;
  color: inherit;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(26,82,118,.18);
  border-color: var(--pri-lt);
}

.card-thumb {
  position: relative;
  width: 100%;
  height: 160px;
  overflow: hidden;
  background: #D5DBDB;
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .35s;
}
.card:hover .card-thumb img { transform: scale(1.04); }
.card-thumb-fallback {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  background: linear-gradient(135deg, #AEB6BF 0%, #D5DBDB 100%);
}

/* badge sección encima de la imagen */
.card-section-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
}

.card-body {
  padding: 14px 16px 10px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.card-title {
  font-size: .97rem;
  font-weight: 700;
  color: var(--text-dk);
  line-height: 1.35;
}
.card-desc {
  font-size: .82rem;
  color: var(--text-md);
  line-height: 1.45;
  flex: 1;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.tag {
  background: var(--tag-bg);
  color: var(--tag-text);
  border-radius: 99px;
  padding: 2px 9px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .04em;
}

.card-footer {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-link-label {
  font-size: .82rem;
  font-weight: 700;
  color: var(--pri-lt);
  letter-spacing: .03em;
}
.card-arrow {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--pri);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.card:hover .card-arrow { background: var(--accent); }
.card-arrow svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* sin resultados */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-md);
  font-size: .95rem;
}
.empty-state span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

/* colores por sección */
.sec-color-0 { background: rgba(118, 84, 26, 0.85);  color: #fff; }
.sec-color-1 { background: rgba(211,84,0,.85);   color: #fff; }
.sec-color-2 { background: rgba(30,132,73,.85);  color: #fff; }
.sec-color-3 { background: rgba(125,60,152,.85); color: #fff; }
.sec-color-4 { background: rgba(20,143,119,.85); color: #fff; }
.sec-color-5 { background: rgba(180,60,40,.85);  color: #fff; }

/* RESPONSIVE */
@media(max-width:600px){
  .topbar { padding: 0 16px; }
  .breadcrumb { padding: 10px 16px; }
  .hero { padding: 28px 16px 24px; }
  .toolbar { padding: 16px 14px 0; }
  .grid-section { padding: 16px 14px 40px; }
  .search-box { width: 100%; }
  .topbar-user span { display: none; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<nav class="topbar">
  <a href="#" class="topbar-logo">
    <img src="img/Gemini_Generated_Image_ig2ddlig2ddlig2d.png" alt="LOGO" width="60px">
    <span>EDU CAFE</span>
  </a>
  <div class="topbar-spacer"></div>
  <div class="topbar-user">
    <div class="avatar">ES</div>
    <span>Estudiante</span>
  </div>
</nav>

<!-- BREADCRUMB -->
<div class="breadcrumb">
  <a href="#">Inicio</a>
  <span class="sep">›</span>
  <a href="#">Mis cursos</a>
  <span class="sep">›</span>
  <span>Juegos didácticos</span>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <h1>Juegos Didácticos</h1>
    <p>Aprende de forma interactiva. Selecciona una actividad para comenzar.</p>
    <div class="hero-meta">
      <span class="hero-badge" id="heroTotal">— actividades</span>
      <span class="hero-badge">Aprendizaje activo</span>
      <span class="hero-badge">Interactivo</span>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="toolbar-title">Filtrar:</span>
  <button class="filter-btn active" data-filter="all">Todos</button>
  <!-- botones de sección se inyectan por JS -->
  <div id="filterBtns"></div>
  <div class="toolbar-spacer"></div>
  <input class="search-box" type="text" id="searchInput" placeholder="Buscar actividad...">
</div>

<!-- GRID -->
<div class="grid-section">
  <div class="grid" id="cardGrid"></div>
</div>

<script>
/* ════════════════════════════════════════
   ARRAY DE JUEGOS
   Campos: nombre, link, imagen (URL), seccion, descripcion, tags
   ════════════════════════════════════════ */
const juegos = [
  {
    nombre: "El Campesino Cafetero",
    link: "paginas/elcafeterocampesino.html",
    imagen: "https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=600&q=80",
    seccion: "Ciencias Naturales",
    descripcion: "Verdadero o falso sobre la caficultura colombiana. Ayuda al campesino a llegar a su finca.",
    tags: ["V/F", "Colombia", "Café"]
  },
  
];

/* ── Paleta de secciones (color por índice de sección única) ── */
const sectionColors = {};
let colorIdx = 0;
juegos.forEach(j => {
  if (!(j.seccion in sectionColors)) {
    sectionColors[j.seccion] = colorIdx++;
  }
});

/* ── Render hero total ── */
document.getElementById('heroTotal').textContent = `${juegos.length} actividades`;

/* ── Botones de filtro ── */
const filterContainer = document.getElementById('filterBtns');
filterContainer.style.display = 'contents';
const secciones = [...new Set(juegos.map(j => j.seccion))];
secciones.forEach(sec => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.filter = sec;
  btn.textContent = sec;
  btn.addEventListener('click', () => setFilter(sec));
  filterContainer.appendChild(btn);
});

let activeFilter = 'all';
let searchQuery  = '';

function setFilter(val) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === val);
  });
  renderCards();
}

document.querySelector('.filter-btn[data-filter="all"]').addEventListener('click', () => setFilter('all'));

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderCards();
});

/* ── Render cards ── */
function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';

  const filtered = juegos.filter(j => {
    const matchFilter = activeFilter === 'all' || j.seccion === activeFilter;
    const matchSearch = !searchQuery ||
      j.nombre.toLowerCase().includes(searchQuery) ||
      j.seccion.toLowerCase().includes(searchQuery) ||
      (j.descripcion && j.descripcion.toLowerCase().includes(searchQuery)) ||
      (j.tags && j.tags.some(t => t.toLowerCase().includes(searchQuery)));
    return matchFilter && matchSearch;
  });

  if (!filtered.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<span>🔍</span>No se encontraron actividades con ese criterio.';
    grid.appendChild(empty);
    return;
  }

  filtered.forEach(juego => {
    const colorClass = 'sec-color-' + (sectionColors[juego.seccion] % 6);
    const card = document.createElement('a');
    card.className = 'card';
    card.href = juego.link;

    /* thumbnail */
    let thumbHtml = '';
    if (juego.imagen) {
      thumbHtml = `
        <div class="card-thumb">
          <img src="${juego.imagen}" alt="${juego.nombre}" loading="lazy"
               onerror="this.parentElement.innerHTML='<div class=\\'card-thumb-fallback\\'>🎮</div>'">
          <span class="card-section-badge ${colorClass}">${juego.seccion}</span>
        </div>`;
    } else {
      thumbHtml = `
        <div class="card-thumb">
          <div class="card-thumb-fallback">🎮</div>
          <span class="card-section-badge ${colorClass}">${juego.seccion}</span>
        </div>`;
    }

    /* tags */
    const tagsHtml = (juego.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

    card.innerHTML = `
      ${thumbHtml}
      <div class="card-body">
        <div class="card-title">${juego.nombre}</div>
        ${juego.descripcion ? `<div class="card-desc">${juego.descripcion}</div>` : ''}
        ${tagsHtml ? `<div class="card-meta">${tagsHtml}</div>` : ''}
      </div>
      <div class="card-footer">
        <span class="card-link-label">Iniciar actividad</span>
        <div class="card-arrow">
          <svg viewBox="0 0 14 14"><line x1="2" y1="7" x2="12" y2="7"/><polyline points="8,3 12,7 8,11"/></svg>
        </div>
      </div>`;

    grid.appendChild(card);
  });
}

renderCards();
</script>
</body>
</html>
